<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>電力業界 営業インテリジェンス</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <div>
          <h1>電力業界 営業インテリジェンス</h1>
          <span class="logo-sub">Powered by GRID</span>
        </div>
      </div>
      <div class="header-right">
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="customer">顧客情報</button>
          <button class="mode-btn" data-mode="competitor">競合情報</button>
        </div>
        <div class="range-toggle">
          <button class="range-btn active" data-range="daily">今日</button>
          <button class="range-btn" data-range="weekly">7日</button>
          <button class="range-btn" data-range="monthly">1ヶ月</button>
          <button class="range-btn" data-range="3months">3ヶ月</button>
          <button class="range-btn" data-range="6months">半年</button>
        </div>
      </div>
    </div>
  </header>

  <!-- 顧客モード -->
  <div id="customerMode">
    <section class="fetch-panel">
      <div class="fetch-inner">
        <div class="fetch-form">
          <label class="fetch-label">ターゲット企業</label>
          <div class="fetch-row">
            <input type="text" id="companyInput" placeholder="例：関西電力、東京電力、中部電力..." class="company-input" />
            <button id="fetchBtn" class="btn-primary">ニュースを取得</button>
          </div>
          <div class="company-history" id="companyHistory"></div>
        </div>
        <div class="fetch-status" id="fetchStatus"></div>
      </div>
    </section>

    <section class="filter-bar">
      <div class="filter-inner">
        <div class="filter-group">
          <span class="filter-label">緊急度</span>
          <div class="filter-tabs" id="urgencyTabs">
            <button class="filter-btn active" data-urgency="all">すべて</button>
            <button class="filter-btn" data-urgency="high"><span class="urgency-dot high"></span>要アクション</button>
            <button class="filter-btn" data-urgency="medium"><span class="urgency-dot medium"></span>注目</button>
            <button class="filter-btn" data-urgency="low"><span class="urgency-dot low"></span>情報収集</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">シグナル</span>
          <div class="filter-tabs" id="signalTabs">
            <button class="filter-btn active" data-signal="all">すべて</button>
            <button class="filter-btn" data-signal="投資・拡大">投資・拡大</button>
            <button class="filter-btn" data-signal="課題・問題">課題・問題</button>
            <button class="filter-btn" data-signal="規制・政策">規制・政策</button>
            <button class="filter-btn" data-signal="競合動向">競合動向</button>
            <button class="filter-btn" data-signal="組織変化">組織変化</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">カテゴリ</span>
          <div class="filter-tabs" id="categoryTabs">
            <button class="filter-btn active" data-cat="all">すべて</button>
            <button class="filter-btn" data-cat="小売り">小売り</button>
            <button class="filter-btn" data-cat="発電">発電</button>
            <button class="filter-btn" data-cat="送配電">送配電</button>
          </div>
        </div>
        <div class="filter-group filter-group-right">
          <span class="filter-label">並び替え</span>
          <div class="filter-tabs" id="sortTabs">
            <button class="filter-btn active" data-sort="urgency">重要度</button>
            <button class="filter-btn" data-sort="date">日付</button>
            <button class="filter-btn" data-sort="category">カテゴリ</button>
          </div>
          <select id="companyFilter" class="company-select">
            <option value="">すべての企業</option>
          </select>
        </div>
      </div>
    </section>

    <div class="content-area">
      <div class="company-summary" id="companySummary" style="display:none">
        <div class="summary-cards" id="summaryCards"></div>
      </div>
      <section class="grid-topics" id="gridTopicsSection" style="display:none">
        <div class="grid-header-bar">
          <span class="grid-badge">GRID TOPICS</span>
          <h2>提案機会あり</h2>
          <span class="section-count" id="gridCount">0件</span>
        </div>
        <div class="grid-articles-inner">
          <div class="news-grid" id="gridArticles"></div>
        </div>
      </section>
      <div class="categories-container" id="categoriesContainer"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">🔍</div>
        <p>ニュースがありません</p>
        <p class="empty-sub">ターゲット企業名を入力してニュースを取得してください</p>
      </div>
      <div class="loading-state" id="loadingState" style="display:none">
        <div class="spinner"></div>
        <p>ニュースを収集・分析中...</p>
      </div>
    </div>
  </div>

  <!-- 競合モード -->
  <div id="competitorMode" style="display:none">
    <section class="fetch-panel competitor-panel">
      <div class="fetch-inner">
        <div class="fetch-form">
          <label class="fetch-label">競合企業を追加</label>
          <div class="fetch-row">
            <input type="text" id="competitorInput" placeholder="例：東芝エネルギー、日立、富士電機..." class="company-input" />
            <button id="competitorFetchBtn" class="btn-competitor">競合として登録・取得</button>
          </div>
          <div class="company-history" id="competitorHistory"></div>
        </div>
        <div class="fetch-status" id="competitorFetchStatus"></div>
      </div>
    </section>

    <section class="filter-bar">
      <div class="filter-inner">
        <div class="filter-group">
          <span class="filter-label">シグナル</span>
          <div class="filter-tabs" id="competitorSignalTabs">
            <button class="filter-btn active" data-csignal="all">すべて</button>
            <button class="filter-btn" data-csignal="新製品・機能">新製品・機能</button>
            <button class="filter-btn" data-csignal="受注・導入事例">受注・導入事例</button>
            <button class="filter-btn" data-csignal="提携・協業">提携・協業</button>
            <button class="filter-btn" data-csignal="資金調達・上場">資金調達・上場</button>
            <button class="filter-btn" data-csignal="価格・戦略">価格・戦略</button>
          </div>
        </div>
        <div class="filter-group filter-group-right">
          <select id="competitorFilter" class="company-select">
            <option value="">すべての競合</option>
          </select>
        </div>
      </div>
    </section>

    <div class="content-area">
      <div class="competitor-landscape" id="competitorLandscape"></div>
      <div class="loading-state" id="competitorLoadingState" style="display:none">
        <div class="spinner"></div>
        <p>競合情報を収集中...</p>
      </div>
      <div class="empty-state" id="competitorEmptyState" style="display:none">
        <div class="empty-icon">🏢</div>
        <p>競合企業が登録されていません</p>
        <p class="empty-sub">競合企業名を入力して「競合として登録・取得」してください</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
